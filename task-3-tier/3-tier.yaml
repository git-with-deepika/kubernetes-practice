apiVersion: v1
kind: Namespace

metadata:
  name: multi-tier-lab


---

apiVersion: v1
kind: Secret

metadata:
  name: postgres-secret
  namespace: multi-tier-lab
type: Opaque
stringData:
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: apppass
  POSTGRES_DB: appdb

---

apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: postgres-pvc
  namespace: multi-tier-lab

spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---

apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres-deployment
  namespace: multi-tier-lab

spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      tier: database

  template:
    metadata:
      labels:
        app: postgres
        tier: database

    spec:
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432

        envFrom:

        - secretRef:
             name: postgres-secret
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
             claimName: postgres-pvc


---


apiVersion: v1
kind: Service

metadata:
  name: postgres-service
  namespace: multi-tier-lab

spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
