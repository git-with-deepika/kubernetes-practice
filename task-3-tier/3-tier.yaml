apiVersion: v1
kind: Namespace
metadata:
  name: multi-tier-lab

---

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: multi-tier-lab
type: Opaque
stringData:
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: apppass
  POSTGRES_DB: appdb

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: multi-tier-lab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: multi-tier-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      tier: database
  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: postgres-secret
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---

apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: multi-tier-lab
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: multi-tier-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      tier: api
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      containers:
      - name: backend-container
        image: node:20-alpine
        command: ["/bin/sh","-c"]
        args:
        - |
          mkdir -p /app && cd /app
          npm init -y
          npm install express pg

          cat > server.js << 'EOF'
          const express = require("express");
          const { Pool } = require("pg");

          const app = express();

          const pool = new Pool({
            host: process.env.DB_HOST,
            port: process.env.DB_PORT,
            database: process.env.DB_NAME,
            user: process.env.DB_USER,
            password: process.env.DB_PASSWORD
          });

          app.get("/", (req, res) => {
            res.send("Backend API is running");
          });

          app.get("/api/health", async (req, res) => {
            try {
              const result = await pool.query("SELECT NOW()");
              res.json({
                status: "Backend connected to PostgreSQL",
                db_time: result.rows[0].now
              });
            } catch (error) {
              res.status(500).json({
                status: "Database connection failed",
                error: error.message
              });
            }
          });

          app.listen(5000, () => {
            console.log("Backend running on port 5000");
          });
          EOF

          node server.js
        ports: 
        - containerPort: 5000
        env:
        - name: DB_HOST
          value: postgres-service
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DB
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD


---

apiVersion: v1
kind: Service

metadata: 
  name: backend-service
  namespace: multi-tier-lab

spec:
 type: ClusterIP
 selector:
   app: backend
 ports:
 - port: 5000
   targetPort: 5000     

---

apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-deployment
  namespace: multi-tier-lab

spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      tier: web
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
      - name: frontend-container
        image: nginx:latest
        ports:
        - containerPort: 80       

---
apiVersion: v1
kind: Service

metadata:
  name: frontend-service
  namespace: multi-tier-lab

spec: 
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080    

